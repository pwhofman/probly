# This workflow will upload a Python Package using Twine when a release is created
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python#publishing-to-package-registries

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Publish Release
on:
  release:
    types: [published]
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      with:
        persist-credentials: false
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: '3.13'
    - name: Set up uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v7.0.0
      with:
        python-version: "3.13"
        enable-cache: false
    - name: Generate type stubs
      run: uv run --locked --group lint python scripts/generate_stubs.py
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build
    - name: Build package
      run: python -m build
    - name: Verify wheel ships type stubs
      run: |
        python - <<'EOF'
        import glob
        import sys
        import zipfile

        [wheel] = glob.glob("dist/*.whl")
        names = zipfile.ZipFile(wheel).namelist()
        stubs = [name for name in names if name.endswith(".pyi")]
        has_marker = "probly/py.typed" in names
        print(f"{wheel}: {len(stubs)} .pyi files, py.typed present: {has_marker}")
        if not stubs or not has_marker:
            sys.exit("wheel is missing type stubs or the py.typed marker; refusing to publish")
        EOF
    - name: Publish package
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
