name: Docs CI

on:
  workflow_dispatch:
    inputs:
      docs-cache:
        description: "Restore the docs build cache (incremental). Leave off for a full uncached rebuild."
        type: boolean
        default: false
  push:
    branches: [main]
  schedule:
    # Weekly full strict build; also seeds the docs build cache for PR builds.
    - cron: "0 4 * * 1"
  pull_request:
    types: [opened, labeled, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  doc_build:
    name: Test Documentation Build
    # Skip draft PRs (the "CI: run-docs" label still forces a build on a draft);
    # always build for pushes, the schedule, and manual dispatch.
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.draft == false ||
      contains(join(github.event.pull_request.labels.*.name, ','), 'run-docs')
    # PRs build incrementally (cached); the "CI: run-docs" label, a push to
    # main, or the weekly schedule forces a full uncached build (label matched
    # by substring: name has emoji). Manual dispatch defaults to a full build
    # but can opt into the cache via the docs-cache input -- run it on a PR's
    # branch to force a full rebuild of that PR.
    uses: ./.github/workflows/_docs-build.yml
    with:
      strict: true
      # Same base-url as deploys so all cached builds share one .buildinfo
      # config hash; otherwise CI and deploy builds would force each other
      # to rewrite every page's HTML on alternation.
      base-url: https://pwhofman.github.io/probly/stable/
      docs-cache: >-
        ${{ (github.event_name == 'workflow_dispatch' && inputs.docs-cache) ||
            (github.event_name == 'pull_request' && !contains(join(github.event.pull_request.labels.*.name, ','), 'run-docs')) }}
