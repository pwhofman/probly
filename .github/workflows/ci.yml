# A GitHub Actions workflow file to run on pull request events.
name: Pull Request Checks

on:
    pull_request:
        types: [opened, synchronize, reopened, ready_for_review]
    push:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: read

jobs:
    # ----------------------------------------------------------------------------------------------
    # Code Quality Checks
    # ----------------------------------------------------------------------------------------------
    check_code_quality:
        name: Code Quality Checks
        # Skip draft PRs; runs on ready-for-review, push, and dispatch.
        if: github.event.pull_request.draft == false
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
                with:
                    persist-credentials: false
            -   name: Set up Python and uv
                uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
                with:
                    python-version: "3.13"
                    enable-cache: true
            -   name: Run code-quality checks
                run: uv run prek run --all-files --show-diff-on-failure
    # ----------------------------------------------------------------------------------------------
    # Install and Import Check
    # ----------------------------------------------------------------------------------------------
    install_and_import:
        name: Install and Import Check
        # Skip draft PRs; runs on ready-for-review, push, and dispatch.
        if: github.event.pull_request.draft == false
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
                with:
                    persist-credentials: false
            -   name: Set up Python and uv
                uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
                with:
                    python-version: "3.13"
                    enable-cache: true
            -   name: Create uv virtual environment
                run: uv venv
            -   name: Install probly package
                run: uv run --no-sync uv pip install .
            -   name: Test import
                run: uv run --no-sync python -c "import probly; print('✅ probly imported successfully')"
    # ----------------------------------------------------------------------------------------------
    # Unit Tests with Matrix
    # ----------------------------------------------------------------------------------------------
    run_unit_tests:
        name: Tests (${{ matrix.os }}, ${{ matrix.dependency-group }})
        # Skip draft PRs; runs on ready-for-review, push, and dispatch.
        if: github.event.pull_request.draft == false
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-latest
                      dependency-group: torch
                    - os: ubuntu-latest
                      dependency-group: jax
                    - os: ubuntu-latest
                      dependency-group: river
                    - os: ubuntu-latest
                      dependency-group: transformers
                    - os: macos-latest
                      dependency-group: torch
                    - os: macos-latest
                      dependency-group: jax
                    - os: windows-latest
                      dependency-group: torch
                    - os: windows-latest
                      dependency-group: jax
        runs-on: ${{ matrix.os }}
        steps:
            -   uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
                with:
                    persist-credentials: false
            -   name: Run tests
                uses: ./.github/actions/run-tests
                with:
                    python-version: "3.13"
                    dependency-group: ${{ matrix.dependency-group }}
                    coverage: "true"
                    coverage-artifact-name: coverage-${{ matrix.os }}-${{ matrix.dependency-group }}
    # ----------------------------------------------------------------------------------------------
    # Code Coverage
    # ----------------------------------------------------------------------------------------------
    upload_coverage:
        name: Upload Coverage
        needs:
            - run_unit_tests
            - check_code_quality
            - install_and_import
        runs-on: ubuntu-latest
        if: ${{ github.repository == 'pwhofman/probly' }}
        steps:
            -   uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
                with:
                    persist-credentials: false
            -   name: Download all coverage artifacts
                uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v4
                with:
                    pattern: coverage-*
                    path: coverage-reports/
            -   name: Upload coverage to Codecov
                uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
                with:
                    directory: coverage-reports/
                    fail_ci_if_error: true
