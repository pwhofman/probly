# A GitHub Actions workflow file to run on pull request events.
name: Pull Request Checks

on:
    pull_request:
    push:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: read

jobs:
    # ----------------------------------------------------------------------------------------------
    # Code Quality Checks
    # ----------------------------------------------------------------------------------------------
    check_code_quality:
        name: Code Quality Checks
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
                with:
                    persist-credentials: false
            -   name: Set up Python and uv
                uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7.0.0
                with:
                    python-version: "3.12"
                    enable-cache: true
            -   name: Run code-quality checks
                run: uv run prek run --all-files --show-diff-on-failure
    # ----------------------------------------------------------------------------------------------
    # Install and Import Check
    # ----------------------------------------------------------------------------------------------
    install_and_import:
        name: Install and Import Check
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
                with:
                    persist-credentials: false
            -   name: Set up Python and uv
                uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7.0.0
                with:
                    python-version: "3.12"
                    enable-cache: true
            -   name: Create uv virtual environment
                run: uv venv
            -   name: Install probly package
                run: uv run --no-sync uv pip install .
            -   name: Test import
                run: uv run --no-sync python -c "import probly; print('✅ probly imported successfully')"
    # ----------------------------------------------------------------------------------------------
    # Unit Tests with Matrix
    # ----------------------------------------------------------------------------------------------
    run_unit_tests:
        name: Run Unit Tests
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-latest
                      python-version: "3.12"
                      dependency-group: "all_ml"
                    - os: ubuntu-latest
                      python-version: "3.12"
                      dependency-group: "torch"
                    - os: windows-latest
                      python-version: "3.12"
                      dependency-group: "all_ml"
                    - os: macos-latest
                      python-version: "3.12"
                      dependency-group: "all_ml"
        runs-on: ${{ matrix.os }}
        steps:
            -   uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
                with:
                    persist-credentials: false
            -   name: Set up Python and uv
                uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7.0.0
                with:
                    python-version: ${{ matrix.python-version }}
                    enable-cache: true
            -   name: Install test dependencies
                run: uv sync --no-dev --group test --group ${{ matrix.dependency-group }}
            -   name: Run unit tests
                run: uv run --no-sync pytest "tests/probly" -m "not integration"
    # ----------------------------------------------------------------------------------------------
    # Test Documentation Build (strict — warnings are errors)
    # ----------------------------------------------------------------------------------------------
    doc_build:
      name: Test Documentation Build
      needs:
          - install_and_import
      uses: ./.github/workflows/_docs-build.yml
      with:
        strict: true
    # ----------------------------------------------------------------------------------------------
    # Code Coverage
    # ----------------------------------------------------------------------------------------------
    run_coverage:
        name: Run Test Coverage
        runs-on: ubuntu-latest
        needs:
            - run_unit_tests
            - check_code_quality
            - install_and_import
        steps:
            -   uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
                with:
                  persist-credentials: false
            -   name: Set up Python and uv
                uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7.0.0
                with:
                    python-version: "3.12"
                    enable-cache: true
            -   name: Install test dependencies
                run: uv sync --no-dev --group test --group all_ml
            -   name: Measure coverage
                run: uv run --no-sync pytest "tests/probly" --cov=probly --cov-report=xml
            -   name: Upload coverage to codecov
                if: ${{ github.repository == 'pwhofman/probly' }} # Only upload reports for main repo and not forks
                uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad  # v5.5.3
                with:
                    fail_ci_if_error: true
