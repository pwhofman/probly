# A GitHub Actions workflow file to run on pull request events.
name: Pull Request Checks

on:
    pull_request:
    push:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: read

jobs:
    # ----------------------------------------------------------------------------------------------
    # Code Quality Checks
    # ----------------------------------------------------------------------------------------------
    check_code_quality:
        name: Code Quality Checks
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
                with:
                    persist-credentials: false
            -   name: Set up Python and uv
                uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7.0.0
                with:
                    python-version: "3.13"
                    enable-cache: true
            -   name: Run code-quality checks
                run: uv run prek run --all-files --show-diff-on-failure
    # ----------------------------------------------------------------------------------------------
    # Install and Import Check
    # ----------------------------------------------------------------------------------------------
    install_and_import:
        name: Install and Import Check
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
                with:
                    persist-credentials: false
            -   name: Set up Python and uv
                uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7.0.0
                with:
                    python-version: "3.13"
                    enable-cache: true
            -   name: Create uv virtual environment
                run: uv venv
            -   name: Install probly package
                run: uv run --no-sync uv pip install .
            -   name: Test import
                run: uv run --no-sync python -c "import probly; print('✅ probly imported successfully')"
    # ----------------------------------------------------------------------------------------------
    # Unit Tests with Matrix
    # ----------------------------------------------------------------------------------------------
    run_unit_tests:
        name: Tests (${{ matrix.os }}, ${{ matrix.dependency-group }})
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-latest
                      dependency-group: torch
                    - os: ubuntu-latest
                      dependency-group: jax
                    - os: macos-latest
                      dependency-group: torch
                    - os: macos-latest
                      dependency-group: jax
                    - os: windows-latest
                      dependency-group: torch
                    - os: windows-latest
                      dependency-group: jax
        runs-on: ${{ matrix.os }}
        steps:
            -   uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
                with:
                    persist-credentials: false
            -   name: Run tests
                uses: ./.github/actions/run-tests
                with:
                    python-version: "3.13"
                    dependency-group: ${{ matrix.dependency-group }}
                    coverage: "true"
                    coverage-artifact-name: coverage-${{ matrix.os }}-${{ matrix.dependency-group }}
    # ----------------------------------------------------------------------------------------------
    # Test Documentation Build (strict — warnings are errors)
    # ----------------------------------------------------------------------------------------------
    doc_build:
      name: Test Documentation Build
      needs:
          - install_and_import
      uses: ./.github/workflows/_docs-build.yml
      with:
        strict: true
    # ----------------------------------------------------------------------------------------------
    # Code Coverage
    # ----------------------------------------------------------------------------------------------
    upload_coverage:
        name: Upload Coverage
        needs:
            - run_unit_tests
            - check_code_quality
            - install_and_import
        runs-on: ubuntu-latest
        if: ${{ github.repository == 'pwhofman/probly' }}
        steps:
            -   uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
                with:
                    persist-credentials: false
            -   name: Download all coverage artifacts
                uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16  # v4
                with:
                    pattern: coverage-*
                    path: coverage-reports/
            -   name: Upload coverage to Codecov
                uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2  # v6.0.0
                with:
                    directory: coverage-reports/
                    fail_ci_if_error: true
