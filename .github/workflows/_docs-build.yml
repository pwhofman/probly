# Reusable workflow: Build Sphinx documentation
# Called by CI (strict mode) and deploy (permissive mode)
name: Build Sphinx Docs

on:
  workflow_call:
    inputs:
      strict:
        description: "Treat warnings as errors (-W flag)"
        type: boolean
        default: false

permissions:
    contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
            persist-credentials: false
      - name: Set up Python and uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v7.0.0
        with:
          python-version: "3.13"
          enable-cache: true
      - name: Install dependencies
        run: uv sync
      - name: Build Sphinx documentation
        run: uv run sphinx-build ${{ inputs.strict && '-W' || '' }} -b html docs/source docs/build/html
      - name: Upload docs artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sphinx-docs
          path: docs/build/html
