wandb:
  entity: "probly"
  project: "test"

# Which kind of bar plot to produce.
# - "sp"  : one bar plot for selective prediction.
# - "ood" : two bar plots per ID dataset (near-OOD and far-OOD), each averaged
#           across the band's OOD datasets.
task: ???

seeds: [1, 2, 3]
show: false

# SP defaults
sp:
  measure: default
  decomposition: total

# OOD defaults
ood:
  measure: default
  decomposition: epistemic

cache:
  mode: read   # read | refresh | off

save_path: null   # null -> FIGURE_PATH; relative paths resolve from repo root
