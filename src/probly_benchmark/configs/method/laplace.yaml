# @package method
name: "laplace"
params:
# Forwarded to laplace-torch's Laplace, see https://github.com/aleximmer/Laplace for docs.
# params chosen according to paper recommendations
  likelihood: "classification"
  subset_of_weights: "last_layer"
  hessian_structure: "kron"
train:
  load_from: "base"
  optimize_prior: true
  prior_optimization_method: "gridsearch"
  # Used only when prior_optimization_method == "marglik". Library defaults from baselaplace.py.
  n_steps: 100
  lr: 0.1
  # Used only when prior_optimization_method == "gridsearch". 100 points over log-range [-4, 4]
  # is the laplace-torch default; reduce on ImageNet if the gridsearch evaluation pass is slow.
  prior_grid_size: 100
  # Per-batch size of the val loader used during gridsearch. Needed because laplace-torch's
  # GLM-probit path materialises a (B, num_classes, num_classes) f_var tensor — at ImageNet
  # (C=1000) that is 4*B MB; with the training batch size (2048) it OOMs at 8 GB.
  # null = pass val_loader through unchanged.
  prior_eval_batch_size: null
  # Optional cap on total samples used for gridsearch. int = absolute sample count;
  # float in (0, 1] = fraction of len(val_loader)*batch_size; null = use full val.
  # Subsampling adds NLL-estimate noise (~1/sqrt(N)); 5-10k samples on ImageNet is usually fine.
  prior_eval_subset: null
  # GLM predictive at inference. ImageNet recipe overrides to "nn" because the GLM Jacobian is too expensive
  pred_type: "glm"
    # Batch size used when fitting the Laplace posterior (model.fit). Kept small because KFAC
  # stores CxC hessian square roots per sample; 2048 OOMs on ImageNet (C=1000).
  # null means use original batch_size
  fit_batch_size: null
  # Fraction in (0, 1] of the train set used to fit the Hessian, null = full dataset.
  fit_subset: null
selective_prediction:
    num_samples: 100
ood_detection:
    num_samples: 100
active_learning:
    num_samples: 100
