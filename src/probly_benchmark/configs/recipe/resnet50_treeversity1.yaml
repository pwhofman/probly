# @package _global_
dataset: "treeversity#1"
base_model: "resnet50"
model_type: "logit_classifier"
pretrained: true
epochs: 50
batch_size: 64
num_workers: 16
pin_memory: true
persistent_workers: true
val_split: 0.1
optimizer:
    name: "sgd"
    params:
        lr: 0.01
        momentum: 0.9
        weight_decay: 1e-4

scheduler:
  name: "cosine"

early_stopping:
  patience: 0  # set to > 0 to enable; number of epochs to wait without improvement

# Method-specific overrides for this recipe live in
# configs/override/<method>_resnet50_treeversity1.yaml.
