dataset: "cifar10"
base_model: "resnet18"
pretrained: True
method: "bnn"
epochs: 10
batch_size: 32
loss: "cross_entropy"
wandb: true

optimizer:
    name: "adam"
    params:
        lr: 0.001

scheduler:
  name: "cosine"
  params: {}

early_stopping:
  enabled: false
  patience: 5

grad_clip_norm: 1.0
amp: true
