defaults:
  - _self_
  - supervised_loss: cross_entropy
  - conformal: none
  - method: ??? # user must specify a method.
  - recipe: ??? # user must specify a recipe.
  # Optional combo-specific overrides keyed on (method, recipe)
  - optional override: ${method}_${recipe}

seed: 1
wandb:
  enabled: true
  entity: "probly"
  project: "test"

# models will always be saved in wandb, but this option controls whether they are also saved to disk
save_to_disk: false

grad_clip_norm: 1.0
amp: true
