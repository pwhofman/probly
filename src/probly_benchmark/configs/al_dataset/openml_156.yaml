# @package _global_
dataset:
  name: "openml"
  openml_id: 156

# TabularMLP on letter recognition (16k train, 26 classes):
# Adam 1e-3 works well; 100 epochs ensures convergence on small labeled sets.
epochs: 100
initial_size: 100
query_size: 100
n_iterations: 15
# Bigger batch (vs default 128) to amortize kernel-launch overhead during
# inference over the (capped) 50k unlabeled pool / 20k test set.
batch_size: 4096
