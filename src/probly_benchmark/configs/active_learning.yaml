defaults:
  - _self_
  - method: ???
  - calibration: none
  - al_strategy: uncertainty
  - conformal: none
  - al_dataset: ???
  - supervised_loss: cross_entropy

# AL loop
initial_size: 1000
query_size: 1000
n_iterations: 10

# Optional unlabeled-pool and test-set caps. Each AL iteration scores the
# entire unlabeled pool (and the test set, for accuracy reporting), which
# scales linearly with their size. For huge tabular datasets like
# openml_155 (~660k train) and openml_156 (~800k train) these caps cut
# inference cost dramatically while leaving the AL story intact. Set to
# ``null`` to disable (no cap). Subsampling uses a separate RNG stream so
# it is reproducible and independent of the model/training seed; the
# ``subsample_seed_offset`` lets you re-roll the subsample across reruns.
unlabeled_pool_max_size: 50000
test_max_size: 20000
subsample_seed_offset: 0

# Training (per AL iteration)
epochs: 50
batch_size: 128
optimizer:
  name: "adam"
  params:
    lr: 0.001
scheduler:
  name: "cosine"
  params: {}
early_stopping:
  patience: 0
grad_clip_norm: null
model_type: "logit_classifier"
amp: true

# Experiment
seed: 0
device: null

# WandB (AL-level logging only)
wandb:
  enabled: true
  entity: "probly"
  project: "probly-active-learning"

# Local results aggregation. When ``save_results`` is true, each run appends
# its result dict to ``results_file`` (a JSON list of run dicts) keyed by
# (method, dataset, strategy, seed) so re-runs overwrite previous entries.
# Will be read by local plotting code for debugging and sanity checks.
# Default off so cluster/Hydra runs (where wandb is the source of truth)
# don't write a stray file. Enable locally with ``save_results=true``.
save_results: false
results_file: "al_results.json"

calibration_size: 0.25
